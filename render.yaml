# WUTT — AI Personal Stylist (Myanmar)
# Render.com deployment configuration

services:
  # ── FastAPI Backend ──────────────────────────────────
  - type: web
    name: wutt-api
    runtime: python
    buildCommand: |
      cd backend && pip install -r requirements.txt
    startCommand: |
      cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEBUG
        value: "false"
      - key: FRONTEND_URL
        value: "https://wutt.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: wutt-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRY_HOURS
        value: "24"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: WEATHER_API_KEY
        sync: false

  # ── Static Frontend ──────────────────────────────────
  - type: static
    name: wutt-frontend
    buildCommand: echo done
    staticPublishPath: frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
      - type: rewrite
        source: /api/*
        destination: https://wutt-api.onrender.com/*
    envVars:
      - key: FRONTEND_URL
        value: "https://wutt.onrender.com"

databases:
  - name: wutt-db
    databaseName: wutt
    plan: free
