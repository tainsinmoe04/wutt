# Render Static Site — WUTT Frontend
# Standalone config. For Blueprint deploy, use root render.yaml instead.
# https://render.com/docs/static-sites

services:
  - type: web
    name: wutt-frontend
    env: static
    buildCommand: echo done
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
