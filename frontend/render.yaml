# Render Static Site — WUTT Frontend
# Standalone config for static site deploy.
# https://render.com/docs/static-sites

services:
  - type: web
    name: wutt-frontend
    env: static
    buildCommand: echo done
    staticPublishPath: .
    autoDeploy: true
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
