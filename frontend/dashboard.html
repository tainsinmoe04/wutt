<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WUTT Dashboard — Your AI style advisor">
  <meta name="theme-color" content="#FFFFFF">
  <title>WUTT — စတိုင်အကြံပြုချက်</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Dashboard layout ── */
    .dashboard {
      display: flex;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--wutt-bg-subtle);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--wutt-light);
      border-right: 1px solid var(--wutt-border-light);
      padding: var(--space-xl) 0;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: var(--z-sidebar);
    }
    .sidebar__brand {
      padding: 0 var(--space-xl) var(--space-xl);
      border-bottom: 1px solid var(--wutt-border-light);
      margin-bottom: var(--space-lg);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--wutt-dark);
      letter-spacing: -0.5px;
    }
    .sidebar__brand-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--wutt-primary), var(--wutt-lavender));
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      color: var(--wutt-light);
      font-size: 1.1rem; font-weight: 700;
    }
    .sidebar__nav { flex: 1; display: flex; flex-direction: column; gap: 2px; padding: 0 var(--space-md); }
    .sidebar__link {
      display: flex; align-items: center; gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      font-size: var(--text-sm); font-weight: 500;
      color: var(--wutt-text-light);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--transition-fast);
      background: none; border: none;
      font-family: inherit;
      text-align: left;
      width: 100%;
    }
    .sidebar__link:hover { background: rgba(136,162,255,0.06); color: var(--wutt-dark); }
    .sidebar__link--active { background: rgba(136,162,255,0.1); color: var(--wutt-dark); font-weight: 600; }
    .sidebar__link svg { flex-shrink: 0; }
    .sidebar__footer {
      padding: var(--space-lg) var(--space-xl) 0;
      border-top: 1px solid var(--wutt-border-light);
      margin: var(--space-lg) var(--space-md) 0;
    }
    .sidebar__user {
      font-size: var(--text-xs); color: var(--wutt-text-muted);
      margin-bottom: var(--space-sm); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .sidebar__logout {
      display: flex; align-items: center; gap: var(--space-xs);
      padding: var(--space-xs) var(--space-sm);
      font-size: var(--text-xs); font-weight: 500;
      color: var(--wutt-text-muted); background: none; border: none;
      border-radius: var(--radius-sm); cursor: pointer;
      font-family: inherit; width: 100%; text-align: left;
      transition: all var(--transition-fast);
    }
    .sidebar__logout:hover { background: var(--wutt-error-bg); color: var(--wutt-error); }

    /* ── Main content area ── */
    .dashboard__main {
      flex: 1;
      margin-left: 240px;
      padding: var(--space-xl);
      max-width: calc(100% - 240px);
    }
    .dashboard__grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-xl);
    }

    /* ── Section card (clean) ── */
    .section-card {
      background: var(--wutt-light);
      border: 1px solid var(--wutt-border-light);
      border-radius: var(--radius-xl);
      padding: var(--space-xl);
      box-shadow: var(--shadow-xs);
    }
    .section-card__header {
      display: flex; align-items: center; gap: var(--space-sm);
      margin-bottom: var(--space-xl);
      padding-bottom: var(--space-md);
      border-bottom: 1px solid var(--wutt-border-light);
    }
    .section-card__title {
      font-size: var(--text-base); font-weight: 700;
      color: var(--wutt-dark); flex: 1;
    }
    .section-card__count {
      font-size: var(--text-xs); font-weight: 600;
      color: var(--wutt-text-muted);
      background: var(--wutt-bg-subtle);
      padding: 2px 10px; border-radius: var(--radius-full);
    }

    /* ── Wardrobe grid ── */
    .wardrobe__grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: var(--space-md);
    }
    .wardrobe__item {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--wutt-border-light);
      aspect-ratio: 3/4;
      cursor: pointer;
      transition: all var(--transition-base);
    }
    .wardrobe__item:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .wardrobe__item img { width: 100%; height: 100%; object-fit: cover; }
    .wardrobe__item-delete {
      position: absolute;
      top: 6px; right: 6px;
      min-width: 28px; min-height: 28px; border-radius: var(--radius-full);
      background: rgba(10,10,10,0.6); color: white; border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      opacity: 0;
      transition: opacity var(--transition-fast);
    }
    .wardrobe__item:hover .wardrobe__item-delete { opacity: 1; }
    .wardrobe__item-meta {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(10,10,10,0.65); color: white;
      padding: 0.2rem 0.5rem;
      font-size: 11px; font-weight: 500;
    }

    /* ── Stylist response area ── */
    .ai-response {
      margin-top: var(--space-lg);
      animation: slideUp 0.4s ease-out;
    }

    /* ── History list ── */
    .history__item {
      padding: var(--space-md);
      border: 1px solid var(--wutt-border-light);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-sm);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .history__item:hover { border-color: var(--wutt-primary); box-shadow: var(--shadow-xs); }
    .history__item-occasion { font-weight: 600; color: var(--wutt-dark); font-size: var(--text-sm); }
    .history__item-preview {
      font-size: var(--text-xs); color: var(--wutt-text-muted); margin-top: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .history__item-date {
      font-size: 11px; color: var(--wutt-text-muted); margin-top: 6px; opacity: 0.7;
    }
    .history__item--expanded .history__item-preview {
      -webkit-line-clamp: unset; overflow: visible;
    }

    /* ── Wardrobe count badge ── */
    .wardrobe__count {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 20px; height: 20px; padding: 0 6px;
      font-size: 11px; font-weight: 700;
      color: var(--wutt-light); background: var(--wutt-dark);
      border-radius: var(--radius-full);
    }

    /* ── Upload progress ── */
    .upload-progress {
      width: 100%; height: 3px;
      background: var(--wutt-border-light); border-radius: 2px;
      margin-top: var(--space-sm); overflow: hidden;
    }
    .upload-progress__bar {
      height: 100%; background: var(--wutt-dark); border-radius: 2px;
      transition: width 0.3s ease;
      animation: progressPulse 1.5s ease-in-out infinite;
    }
    @keyframes progressPulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.5; }
    }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed; inset: 0; z-index: var(--z-modal);
      background: rgba(10,10,10,0.9);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; animation: fadeIn 0.2s ease-out;
    }
    .lightbox img {
      max-width: 90vw; max-height: 90dvh; object-fit: contain;
      border-radius: var(--radius-lg);
      box-shadow: 0 0 80px rgba(136,162,255,0.1);
    }
    .lightbox__meta {
      position: absolute; bottom: var(--space-lg); left: 50%;
      transform: translateX(-50%);
      color: white; font-size: var(--text-sm); font-weight: 500;
      background: rgba(0,0,0,0.5); padding: var(--space-sm) var(--space-lg);
      border-radius: var(--radius-full);
    }

    /* ── Image error fallback ── */
    .wardrobe__item-error {
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 100%; background: var(--wutt-bg-subtle);
      color: var(--wutt-text-muted); font-size: 2rem;
    }

    /* ── Thinking indicator ── */
    .thinking {
      display: flex; align-items: center; gap: var(--space-sm);
      padding: var(--space-lg); color: var(--wutt-text-muted);
      font-size: var(--text-sm);
    }
    .thinking__dots { display: flex; gap: 4px; }
    .thinking__dot {
      width: 5px; height: 5px;
      background: var(--wutt-dark);
      border-radius: 50%;
      animation: thinkingBounce 1.2s ease-in-out infinite;
    }
    .thinking__dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking__dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes thinkingBounce {
      0%, 80%, 100% { transform: scale(0.4); opacity: 0.2; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ── Mobile ── */
    @media (max-width: 840px) {
      .sidebar {
        position: fixed; top: 0; left: -100%;
        width: 260px; height: 100dvh;
        transition: left var(--transition-base);
        z-index: var(--z-sidebar);
      }
      .sidebar--open { left: 0; }
      .dashboard__main { margin-left: 0; max-width: 100%; padding: var(--space-md); }
      .dashboard__grid { grid-template-columns: 1fr; }

      /* Mobile top bar */
      .mobile-bar {
        display: flex;
        align-items: center; justify-content: space-between;
        padding: var(--space-sm) var(--space-md);
        background: var(--wutt-light);
        border-bottom: 1px solid var(--wutt-border-light);
        position: sticky; top: 0; z-index: var(--z-sticky);
        margin: calc(-1 * var(--space-md)); margin-bottom: var(--space-md);
      }
    }
    @media (min-width: 841px) { .mobile-bar { display: none; } }
  </style>
</head>
<body>

  <a href="#dashboard-main" class="skip-link">Skip to main content</a>

  <!-- Mobile top bar -->
  <div class="mobile-bar">
    <button type="button" id="mobileMenuBtn" style="background:none;border:none;cursor:pointer;padding:8px;border-radius:8px;display:flex;align-items:center;color:var(--wutt-text);" aria-label="Open menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <span style="font-weight:700;font-size:var(--text-lg);color:var(--wutt-dark);letter-spacing:-0.5px;">
      <span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:linear-gradient(135deg,var(--wutt-primary),var(--wutt-lavender));border-radius:6px;color:white;font-size:12px;font-weight:700;margin-right:6px;">W</span>WUTT
    </span>
    <span id="dashboardUserEmail" style="font-size:11px;color:var(--wutt-text-muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
  </div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand">
      <span class="sidebar__brand-icon" aria-hidden="true">W</span>
      WUTT
    </div>
    <nav class="sidebar__nav" role="navigation" aria-label="Dashboard navigation">
      <a href="#" class="sidebar__link sidebar__link--active" data-section="stylist">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 0 1 4 4c0 1.1-.4 2.1-1.1 2.9l.5.5a4 4 0 0 1 0 5.7l-.5.5c.7.8 1.1 1.8 1.1 2.9a4 4 0 0 1-4 4"/><path d="M12 2a4 4 0 0 0-4 4c0 1.1.4 2.1 1.1 2.9l-.5.5a4 4 0 0 0 0 5.7l.5.5c-.7.8-1.1 1.8-1.1 2.9a4 4 0 0 0 4 4"/></svg>
        စတိုင်အကြံပြုချက်
      </a>
      <a href="#" class="sidebar__link" data-section="wardrobe">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        ကျွန်ုပ်၏ဗီရို
        <span class="wardrobe__count u-hidden" id="wardrobeCount" style="margin-left:auto;">0</span>
      </a>
      <a href="#" class="sidebar__link" data-section="history">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        စတိုင်မှတ်တမ်း
      </a>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user" id="sidebarEmail"></div>
      <button type="button" class="sidebar__logout" id="logoutBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        ထွက်မယ်
      </button>
    </div>
  </aside>

  <!-- Sidebar overlay (mobile) -->
  <div id="sidebarOverlay" style="display:none;position:fixed;inset:0;background:rgba(10,10,10,0.3);z-index:calc(var(--z-sidebar) - 1);" onclick="closeSidebar()"></div>

  <!-- Main -->
  <main id="dashboard-main" class="dashboard">
    <div class="dashboard__main">
      <div id="globalAlert" class="u-hidden" role="alert" style="margin-bottom:var(--space-lg);"></div>

      <div class="dashboard__grid">
        <!-- Left column: Profile + Stylist -->
        <div>
          <!-- Profile -->
          <div class="section-card stagger">
            <div class="section-card__header">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--wutt-primary)" stroke-width="2" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <span class="section-card__title">ကိုယ်ရေးအချက်အလက်</span>
            </div>
            <form id="profileForm" novalidate>
              <div class="input">
                <label class="input__label" for="profileHeight">အရပ် (cm)</label>
                <input class="input__field" type="number" id="profileHeight" name="height_cm" placeholder="ဥပမာ 170" min="50" max="250" step="0.1">
              </div>
              <div class="input" style="margin-top:var(--space-md);">
                <label class="input__label" for="profileSkinTone">အသားအရောင်</label>
                <select class="select" id="profileSkinTone" name="skin_tone">
                  <option value="">-- ရွေးပါ --</option>
                  <option value="fair">အသားဖြူ</option>
                  <option value="light">အသားညိုနု</option>
                  <option value="medium">အသားညို</option>
                  <option value="tan">အသားညိုရင့်</option>
                  <option value="dark">အသားမည်း</option>
                </select>
              </div>
              <div class="input" style="margin-top:var(--space-md);">
                <label class="input__label" for="profileStyle">ဝတ်စားဟန်</label>
                <select class="select" id="profileStyle" name="style_preference">
                  <option value="">-- ရွေးပါ --</option>
                  <option value="casual">ပေါ့ပေါ့ပါးပါး</option>
                  <option value="formal">သပ်သပ်ရပ်ရပ်</option>
                  <option value="traditional">ရိုးရာ</option>
                  <option value="sporty">အားကစားဆန်</option>
                  <option value="streetwear">လမ်းပေါ်ကစတိုင်</option>
                </select>
              </div>
              <div class="input" style="margin-top:var(--space-md);">
                <label class="input__label" for="profileCity">မြို့</label>
                <input class="input__field" type="text" id="profileCity" name="location_city" placeholder="ဥပမာ Yangon" maxlength="100">
              </div>
              <button type="submit" class="btn btn--primary btn--full" style="margin-top:var(--space-lg);">
                <span class="btn__label">သိမ်းမယ်</span>
                <span class="btn__spinner" aria-hidden="true"></span>
              </button>
            </form>
          </div>

          <!-- Stylist -->
          <div class="section-card" style="margin-top:var(--space-xl);" id="stylistSection">
            <div class="section-card__header">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--wutt-lavender)" stroke-width="2" aria-hidden="true"><path d="M12 2a4 4 0 0 1 4 4c0 1.1-.4 2.1-1.1 2.9l.5.5a4 4 0 0 1 0 5.7l-.5.5c.7.8 1.1 1.8 1.1 2.9a4 4 0 0 1-4 4"/><path d="M12 2a4 4 0 0 0-4 4c0 1.1.4 2.1 1.1 2.9l-.5.5a4 4 0 0 0 0 5.7l.5.5c-.7.8-1.1 1.8-1.1 2.9a4 4 0 0 0 4 4"/></svg>
              <span class="section-card__title">စတိုင်အကြံပြုချက်</span>
            </div>
            <form id="stylistForm" novalidate>
              <div class="input">
                <label class="input__label" for="occasion">ဘယ်အတွက်ဝတ်မလဲ?</label>
                <select class="select" id="occasion" name="occasion" required>
                  <option value="">-- ရွေးပါ --</option>
                  <option value="wedding">မင်္ဂလာပွဲ</option>
                  <option value="work">ရုံးသွား</option>
                  <option value="party">ပါတီ</option>
                  <option value="date">ချိန်းတွေ့</option>
                  <option value="casual">အပြင်ထွက်</option>
                  <option value="interview">အင်တာဗျူး</option>
                </select>
              </div>
              <button type="submit" class="btn btn--primary btn--full" style="margin-top:var(--space-lg);" id="recommendBtn">
                <span class="btn__label">အကြံပြုပါ</span>
                <span class="btn__spinner" aria-hidden="true"></span>
              </button>
            </form>
            <div id="aiResponse" class="ai-response u-hidden"></div>
          </div>
        </div>

        <!-- Right column: Wardrobe + History -->
        <div>
          <!-- Wardrobe -->
          <div class="section-card" id="wardrobeSection">
            <div class="section-card__header">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--wutt-primary)" stroke-width="2" aria-hidden="true"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              <span class="section-card__title">ကျွန်ုပ်၏ဗီရို</span>
            </div>
            <form id="wardrobeForm" novalidate enctype="multipart/form-data">
              <label class="upload-box" id="uploadBox" for="wardrobeFile" style="min-height:120px;">
                <span class="upload-box__icon" aria-hidden="true">
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                </span>
                <span class="upload-box__text">ဓာတ်ပုံထည့်ရန်နှိပ်ပါ</span>
                <span class="upload-box__hint">JPEG, PNG, or WebP — 10 MB max</span>
              </label>
              <input type="file" id="wardrobeFile" name="file" accept="image/jpeg,image/png,image/webp" style="display:none;">
              <div class="upload-preview" id="uploadPreview" style="display:flex;gap:var(--space-sm);flex-wrap:wrap;margin-top:var(--space-sm);"></div>
              <div style="display:flex;gap:var(--space-sm);margin-top:var(--space-md);">
                <select class="select" id="wardrobeCategory" name="category" style="flex:1;">
                  <option value="">အမျိုးအစား</option>
                  <option value="top">အပေါ်ဝတ်</option>
                  <option value="bottom">အောက်ဝတ်</option>
                  <option value="dress">တစ်ဆက်တည်းဝတ်စုံ</option>
                  <option value="outerwear">အပေါ်ထပ်</option>
                  <option value="shoes">ဖိနပ်</option>
                  <option value="accessory">အသုံးအဆောင်</option>
                </select>
                <select class="select" id="wardrobeColor" name="color" style="flex:1;">
                  <option value="">အရောင်</option>
                  <option value="black">အနက်</option><option value="white">အဖြူ</option>
                  <option value="red">အနီ</option><option value="blue">အပြာ</option>
                  <option value="green">အစိမ်း</option><option value="yellow">အဝါ</option>
                  <option value="pink">ပန်းရောင်</option><option value="purple">ခရမ်း</option>
                  <option value="brown">အညို</option><option value="grey">မီးခိုး</option>
                  <option value="navy">နေပယ်ပြာ</option><option value="beige">ဘဲဂျီ</option>
                </select>
              </div>
              <div class="alert alert--error u-hidden" id="uploadError" role="alert" style="margin-top:var(--space-sm);"></div>
              <button type="submit" class="btn btn--primary btn--full" style="margin-top:var(--space-md);" id="uploadBtn">
                <span class="btn__label">ထည့်မယ်</span>

              </button>
            </form>
            <div class="wardrobe__grid" id="wardrobeGrid" style="margin-top:var(--space-lg);"></div>
          </div>

          <!-- History -->
          <div class="section-card" style="margin-top:var(--space-xl);" id="historySection">
            <div class="section-card__header">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--wutt-lavender)" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              <span class="section-card__title">စတိုင်မှတ်တမ်း</span>
            </div>
            <div id="historyList"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

  <script>
  // ── WUTT Dashboard — Inline JS ──
  const API = 'https://wutt-api.onrender.com';
  const AUTH_TOKEN = localStorage.getItem('wutt_token');
  let currentUser = null;
  let _redirected = false;

  const $ = (s) => document.querySelector(s);
  const $$ = (s) => document.querySelectorAll(s);

  function goToLogin() {
    if (_redirected) return;
    _redirected = true;
    localStorage.removeItem('wutt_token');
    document.cookie = 'wutt_token=; Max-Age=0; path=/;';
    window.location.replace('./index.html');
  }

  if (!AUTH_TOKEN) { goToLogin(); }

  async function api(method, path, body, formData) {
    const headers = { 'Authorization': 'Bearer ' + AUTH_TOKEN };
    if (!formData) { headers['Content-Type'] = 'application/json'; }
    const opts = { method, headers, credentials: 'include' };
    if (formData) { opts.body = formData; }
    else if (body) { opts.body = JSON.stringify(body); }

    const controller = new AbortController();
    opts.signal = controller.signal;
    const timeout = setTimeout(() => controller.abort(), 15000);

    try {
      const res = await fetch(API + path, opts);
      clearTimeout(timeout);
      const data = await res.json().catch(() => null);
      if (!res.ok) {
        if (res.status === 401) { goToLogin(); return; }
        throw new Error(data?.detail?.message || res.statusText);
      }
      return data;
    } catch (e) {
      clearTimeout(timeout);
      if (e.name === 'AbortError') {
        showToast('ဆာဗာချိတ်ဆက်မှုကြာနေပါတယ်။ ပြန်စမ်းကြည့်ပါ။', 'error');
      } else {
        showToast(e.message, 'error');
      }
      throw e;
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function showToast(msg, type) {
    const t = document.createElement('div');
    t.className = 'toast toast--' + (type||'info');
    t.setAttribute('role', 'status');
    t.textContent = msg;
    t.addEventListener('animationend', (e) => { if (e.animationName==='fadeOut') t.remove(); });
    $('#toastContainer').appendChild(t);
  }

  function setLoading(btn, loading) {
    if (loading) { btn.classList.add('btn--loading'); btn.setAttribute('aria-disabled','true'); }
    else { btn.classList.remove('btn--loading'); btn.removeAttribute('aria-disabled'); }
  }

  // ── Sidebar (mobile) ──
  function openSidebar() {
    $('#sidebar').classList.add('sidebar--open');
    $('#sidebarOverlay').style.display = 'block';
  }
  function closeSidebar() {
    $('#sidebar').classList.remove('sidebar--open');
    $('#sidebarOverlay').style.display = 'none';
  }
  document.getElementById('mobileMenuBtn')?.addEventListener('click', openSidebar);
  document.querySelectorAll('.sidebar__link').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const section = link.dataset.section;
      document.querySelectorAll('.sidebar__link').forEach(l => l.classList.remove('sidebar__link--active'));
      link.classList.add('sidebar__link--active');
      if (section === 'stylist') $('#stylistSection').scrollIntoView({behavior:'smooth'});
      if (section === 'wardrobe') $('#wardrobeSection').scrollIntoView({behavior:'smooth'});
      if (section === 'history') $('#historySection').scrollIntoView({behavior:'smooth'});
      closeSidebar();
    });
  });

  // ── INIT ──
  async function init() {
    showSkeletons();
    try {
      const meData = await api('GET', '/auth/me');
      if (meData.status !== 'success' || !meData.data?.id) { goToLogin(); return; }
      currentUser = { id: meData.data.id, email: meData.data.email };
      $('#dashboardUserEmail').textContent = meData.data.email;
      $('#sidebarEmail').textContent = meData.data.email;
    } catch { goToLogin(); return; }
    await Promise.all([loadProfile(), loadWardrobe(), loadHistory()]);
    clearSkeletons();
  }

  function showSkeletons() {
    $('#wardrobeGrid').innerHTML = `
      <div class="skeleton skeleton--card" style="height:140px;aspect-ratio:3/4;"></div>
      <div class="skeleton skeleton--card" style="height:140px;aspect-ratio:3/4;"></div>
      <div class="skeleton skeleton--card" style="height:140px;aspect-ratio:3/4;"></div>`;
    $('#historyList').innerHTML = `
      <div style="border:1px solid var(--wutt-border-light);border-radius:var(--radius-md);padding:var(--space-md);margin-bottom:var(--space-sm);">
        <div class="skeleton skeleton--text" style="width:40%;margin-bottom:8px;"></div>
        <div class="skeleton skeleton--text" style="width:60%;"></div>
        <div class="skeleton skeleton--text" style="width:25%;height:0.75rem;margin-top:8px;"></div>
      </div>
      <div style="border:1px solid var(--wutt-border-light);border-radius:var(--radius-md);padding:var(--space-md);margin-bottom:var(--space-sm);">
        <div class="skeleton skeleton--text" style="width:50%;margin-bottom:8px;"></div>
        <div class="skeleton skeleton--text" style="width:55%;"></div>
        <div class="skeleton skeleton--text" style="width:20%;height:0.75rem;margin-top:8px;"></div>
      </div>`;
    const profileForm = $('#profileForm');
    if (profileForm && !profileForm.querySelector('.skeleton')) {
      profileForm.querySelectorAll('.input, button[type=submit]').forEach(el => { el.style.display = 'none'; });
      const skel = `
        <div class="skeleton skeleton--form-field"></div>
        <div class="skeleton skeleton--form-field"></div>
        <div class="skeleton skeleton--form-field"></div>
        <div class="skeleton skeleton--form-field"></div>
        <div class="skeleton skeleton--btn"></div>`;
      profileForm.insertAdjacentHTML('beforeend', skel);
    }
    const count = $('#wardrobeCount');
    if (count) { count.classList.add('u-hidden'); }
  }

  function clearSkeletons() {
    const profileForm = $('#profileForm');
    if (profileForm) {
      profileForm.querySelectorAll('.skeleton').forEach(s => s.remove());
      profileForm.querySelectorAll('.input, button[type=submit]').forEach(el => { el.style.display = ''; });
    }
    // Default empty state if no items loaded
    if (!$('#wardrobeGrid').children.length || $('#wardrobeGrid').querySelector('.skeleton')) {
      $('#wardrobeGrid').innerHTML = `
        <div class="empty-state--visual" style="grid-column:1/-1;">
          <div class="empty-state__icon">👗</div>
          <div class="empty-state__title">ဗီရိုထဲမှာ အဝတ်မရှိသေးပါ</div>
          <div class="empty-state__hint">ဓာတ်ပုံရိုက်ပြီး upload လုပ်ပါ</div>
        </div>`;
    }
    if (!$('#historyList').children.length || $('#historyList').querySelector('.skeleton')) {
      $('#historyList').innerHTML = `
        <div class="empty-state--visual">
          <div class="empty-state__icon">🕐</div>
          <div class="empty-state__title">စတိုင်မှတ်တမ်း မရှိသေးပါ</div>
          <div class="empty-state__hint">အကြံပြုချက်များ ဒီမှာတွေ့ရပါမယ်</div>
        </div>`;
    }
  }

  const uid = () => currentUser?.id;

  // ── PROFILE ──
  async function loadProfile() {
    const id = uid(); if (!id) return;
    try {
      const users = await api('GET', '/profile/' + id);
      if (users?.data?.id) {
        const p = users.data;
        $('#profileHeight').value = p.height_cm || '';
        $('#profileSkinTone').value = p.skin_tone || '';
        $('#profileStyle').value = p.style_preference || '';
        $('#profileCity').value = p.location_city || '';
      }
    } catch { /* OK — profile may not exist yet */ }
  }

  $('#profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = uid(); if (!id) return;
    const btn = $('#profileForm').querySelector('button[type=submit]');
    setLoading(btn, true);
    try {
      const body = {
        height_cm: parseFloat($('#profileHeight').value) || null,
        skin_tone: $('#profileSkinTone').value || null,
        style_preference: $('#profileStyle').value || null,
        location_city: $('#profileCity').value || null,
      };
      const res = await api('PUT', '/profile/' + id, body);
      showToast(res.message || 'သိမ်းပြီးပါပြီ။', 'success');
    } catch {} finally { setLoading(btn, false); }
  });

  // ── WARDROBE ──
  async function loadWardrobe() {
    const id = uid(); if (!id) return;
    try {
      const res = await api('GET', '/wardrobe/' + id);
      const items = res?.data || [];
      const grid = $('#wardrobeGrid');
      const count = $('#wardrobeCount');
      if (count) { count.textContent = items.length; count.classList.toggle('u-hidden', items.length === 0); }
      if (!items.length) {
        grid.innerHTML = `
          <div class="empty-state--visual" style="grid-column:1/-1;">
            <div class="empty-state__icon">👗</div>
            <div class="empty-state__title">ဗီရိုထဲမှာ အဝတ်မရှိသေးပါ</div>
            <div class="empty-state__hint">ဓာတ်ပုံရိုက်ပြီး upload လုပ်ပါ</div>
          </div>`;
        return;
      }
      const labelMy = {
        dress:'တစ်ဆက်တည်းဝတ်စုံ',gown:'တစ်ဆက်တည်းဝတ်စုံ',
        top:'အပေါ်ဝတ်',shirt:'အပေါ်ဝတ်',blouse:'အပေါ်ဝတ်','t-shirt':'အပေါ်ဝတ်',
        bottom:'အောက်ဝတ်',trousers:'အောက်ဝတ်',pants:'အောက်ဝတ်',jeans:'အောက်ဝတ်',skirt:'အောက်ဝတ်',
        traditional:'မြန်မာဝတ်စုံ',longyi:'လုံချည်',
        outerwear:'အပေါ်ထပ်',jacket:'အပေါ်ထပ်',blazer:'အပေါ်ထပ်',coat:'အပေါ်ထပ်',
        shoes:'ဖိနပ်',accessory:'အသုံးအဆောင်',
      };
      grid.innerHTML = items.map(i => {
        const rawCat = (i.category || '').toLowerCase().trim();
        const catLabel = labelMy[rawCat] || (i.category || '');
        const meta = catLabel + (i.color ? ' · ' + i.color : '');
        return `
        <div class="wardrobe__item" onclick="openLightbox('${i.cloudinary_url}','${meta.replace(/'/g,"\\'")}')">
          <img src="${i.cloudinary_url}" alt="${catLabel}" loading="lazy"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
          <div class="wardrobe__item-error" style="display:none;">👗</div>
          <button class="wardrobe__item-delete" data-id="${i.id}" title="ဖျက်မယ်" aria-label="Delete item">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
          <div class="wardrobe__item-meta">${meta}</div>
        </div>
      `}).join('');
      grid.querySelectorAll('.wardrobe__item-delete').forEach(b => {
        b.addEventListener('click', (ev) => { ev.stopPropagation(); deleteItem(b.dataset.id); });
      });
    } catch {
      $('#wardrobeGrid').innerHTML = `
        <div class="error-card">
          <div class="error-card__icon">⚠️</div>
          <div class="error-card__text">ဗီရိုဒေတာမရယူနိုင်ပါ။</div>
          <button class="error-card__retry" onclick="loadWardrobe()">ပြန်စမ်းမယ်</button>
        </div>`;
    }
  }

  async function deleteItem(id) {
    const toastId = 'del-confirm-' + Date.now();
    const t = document.createElement('div');
    t.className = 'toast toast--warning'; t.id = toastId; t.setAttribute('role', 'alert');
    t.innerHTML = `<span style="flex:1;">ဒီအဝတ်ကိုဖျက်မှာသေချာလား?</span>
      <button onclick="confirmDelete(${id},'${toastId}')" style="background:var(--wutt-error);color:white;border:none;padding:4px 12px;border-radius:4px;font-weight:600;cursor:pointer;font-family:inherit;">ဖျက်မယ်</button>
      <button onclick="dismissToast('${toastId}')" style="background:transparent;border:1px solid var(--wutt-border);padding:4px 12px;border-radius:4px;cursor:pointer;font-family:inherit;">မဖျက်ပါ</button>`;
    $('#toastContainer').appendChild(t);
  }

  window.confirmDelete = async function(id, toastId) {
    dismissToast(toastId);
    try { await api('DELETE', '/wardrobe/' + id); showToast('ဖျက်ပြီးပါပြီ။', 'success'); await loadWardrobe(); } catch {}
  };
  window.dismissToast = function(id) {
    const t = document.getElementById(id);
    if (t) { t.style.opacity = '0'; t.style.transform = 'translateY(-8px)'; setTimeout(() => t.remove(), 300); }
  };

  window.openLightbox = function(url, meta) {
    const lb = document.createElement('div');
    lb.className = 'lightbox';
    lb.onclick = () => lb.remove();
    lb.innerHTML = `<img src="${url}" alt="${meta||''}" onclick="event.stopPropagation();">${meta ? '<div class="lightbox__meta">'+meta+'</div>' : ''}`;
    document.body.appendChild(lb);
    const onKey = (e) => { if (e.key === 'Escape') { lb.remove(); document.removeEventListener('keydown', onKey); } };
    document.addEventListener('keydown', onKey);
  };

  const ALLOWED_TYPES = ['image/jpeg','image/png','image/webp'];
  const MAX_SIZE = 10 * 1024 * 1024;

  function validateFile(file) {
    if (!file) return null;
    if (!ALLOWED_TYPES.includes(file.type)) return 'JPEG, PNG, or WebP ဖိုင်သာထည့်ပါ။';
    if (file.size > MAX_SIZE) return 'ဖိုင်ဆိုဒ် 10 MB ထက်မကျော်ပါနဲ့။';
    return null;
  }

  function formatFileSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function showPreview(file) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const container = $('#uploadPreview');
      container.innerHTML = `
        <div class="preview-card">
          <img src="${ev.target.result}" alt="${file.name}" class="preview-card__img">
          <div class="preview-card__info">
            <div class="preview-card__name">${file.name}</div>
            <div class="preview-card__size">${formatFileSize(file.size)}</div>
          </div>
          <button type="button" class="preview-card__remove" aria-label="Remove file" onclick="clearPreview()">✕</button>
        </div>`;
    };
    reader.readAsDataURL(file);
  }

  window.clearPreview = function() {
    $('#uploadPreview').innerHTML = '';
    $('#wardrobeFile').value = '';
  };

  function handleFileSelect(file) {
    const err = validateFile(file);
    if (err) { showToast(err, 'error'); return false; }
    showPreview(file);
    return true;
  }

  $('#wardrobeFile').addEventListener('change', (e) => { if (e.target.files[0]) handleFileSelect(e.target.files[0]); });

  const uploadBox = $('#uploadBox');
  if (uploadBox) {
    ['dragenter','dragover'].forEach(evt => {
      uploadBox.addEventListener(evt, (e) => { e.preventDefault(); uploadBox.classList.add('upload-box--active'); });
    });
    ['dragleave','drop'].forEach(evt => {
      uploadBox.addEventListener(evt, (e) => { e.preventDefault(); uploadBox.classList.remove('upload-box--active'); });
    });
    uploadBox.addEventListener('drop', (e) => {
      const file = e.dataTransfer.files[0];
      if (file) { $('#wardrobeFile').files = e.dataTransfer.files; handleFileSelect(file); }
    });
  }

  $('#wardrobeForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const file = $('#wardrobeFile').files[0];
    if (!file) { showToast('ဓာတ်ပုံရွေးချယ်ပါ။', 'error'); return; }
    const err = validateFile(file);
    if (err) { showToast(err, 'error'); return; }
    const btn = $('#uploadBtn'); setLoading(btn, true);
    const progressHTML = '<div class="upload-progress"><div class="upload-progress__bar" style="width:60%;"></div></div>';
    const progressEl = document.createElement('div');
    progressEl.innerHTML = progressHTML;
    btn.parentNode.insertBefore(progressEl.firstElementChild, btn.nextSibling);
    try {
      const fd = new FormData(); fd.append('file', file);
      const cat = $('#wardrobeCategory').value; const col = $('#wardrobeColor').value;
      if (cat) fd.append('category', cat);
      if (col) fd.append('color', col);
      const res = await api('POST', '/wardrobe/upload', null, fd);
      const uploadErr = $('#uploadError');
      if (uploadErr) { uploadErr.classList.add('u-hidden'); uploadErr.textContent = ''; }
      const preview = $('#uploadPreview');
      preview.innerHTML = `
        <div class="upload-success">
          <span class="upload-success__check">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
          </span>
          ${res.message || 'ထည့်ပြီးပါပြီ။'}
        </div>`;
      showToast(res.message || 'ထည့်ပြီးပါပြီ။', 'success');
      $('#wardrobeForm').reset();
      setTimeout(() => { preview.innerHTML = ''; }, 2000);
      await loadWardrobe();
    } catch (uploadErr) {
      const errEl = $('#uploadError');
      if (errEl) {
        errEl.textContent = uploadErr?.message || 'Upload မအောင်မြင်ပါ။ ပြန်စမ်းကြည့်ပါ။';
        errEl.classList.remove('u-hidden');
      }
    } finally {
      setLoading(btn, false);
      const bar = btn.parentNode.querySelector('.upload-progress');
      if (bar) bar.remove();
    }
  });

  // ── STYLIST ──
  function showThinking(itemCount) {
    const resp = $('#aiResponse');
    resp.classList.remove('u-hidden'); resp.style.cssText = '';
    resp.innerHTML = `
      <div class="outfit-card" style="text-align:center;padding:var(--space-2xl);">
        <div class="spinner spinner--lg" style="margin:0 auto var(--space-md);"></div>
        <div style="font-weight:600;margin-bottom:4px;">စဉ်းစားနေသည်</div>
        <div style="font-size:12px;color:var(--wutt-text-muted);">ဗီရိုထဲက အဝတ် ${itemCount||'?'} ခုကို ခွဲခြမ်းစိတ်ဖြာနေပါတယ်...</div>
        <span class="thinking__dots" style="justify-content:center;margin-top:8px;">
          <span class="thinking__dot"></span><span class="thinking__dot"></span><span class="thinking__dot"></span>
        </span>
      </div>`;
    resp.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function formatDateMyanmar(isoStr) {
    if (!isoStr) return '';
    const date = new Date(isoStr);
    if (isNaN(date.getTime())) return isoStr;
    const parts = new Intl.DateTimeFormat('en-US', {
      timeZone: 'Asia/Yangon', year: 'numeric', month: 'long', day: 'numeric',
      hour: 'numeric', minute: '2-digit', hour12: true,
    }).formatToParts(date);
    const vals = {};
    for (const p of parts) { if (p.type !== 'literal') vals[p.type] = p.value; }
    const mmMonths = {
      January:'ဇန်နဝါရီ',February:'ဖေဖော်ဝါရီ',March:'မတ်',April:'ဧပြီ',
      May:'မေ',June:'ဇွန်',July:'ဇူလိုင်',August:'သြဂုတ်',
      September:'စက်တင်ဘာ',October:'အောက်တိုဘာ',November:'နိုဝင်ဘာ',December:'ဒီဇင်ဘា',
    };
    const y = vals.year; const m = mmMonths[vals.month] || vals.month;
    const d = vals.day; const ampm = vals.dayPeriod === 'AM' ? 'မနက်' : 'ညနေ';
    return `${y} ${m} ${d} · ${ampm} ${vals.hour}:${vals.minute}`;
  }

  function renderOutfitRecommendation(data) {
    let html = '';
    const esc = (s) => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const occasionLabels = {wedding:'မင်္ဂလာပွဲ',work:'ရုံးသွား',party:'ပါတီ',date:'ချိန်းတွေ့',casual:'အပြင်ထွက်',interview:'အင်တာဗျူး'};
    html += '<div class="outfit-card outfit-card--context">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--space-sm);">';
    html += '<div>';
    html += '<div style="font-weight:700;font-size:1rem;color:var(--wutt-dark);">' + (occasionLabels[data.occasion] || esc(data.occasion)) + '</div>';
    if (data.weather_desc) {
      html += '<div style="font-size:var(--text-sm);color:var(--wutt-text-muted);margin-top:4px;">';
      html += '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>';
      html += esc(data.weather_desc);
      if (data.temperature_c != null) html += ' · ' + data.temperature_c.toFixed(0) + '°C';
      if (data.location) html += ' · ' + esc(data.location);
      html += '</div>';
    }
    html += '</div></div></div>';

    const outfit = data.outfit || [];
    if (outfit.length > 0) {
      html += '<div class="outfit-card">';
      html += '<div style="font-weight:600;font-size:var(--text-xs);color:var(--wutt-text-muted);margin-bottom:var(--space-sm);">👗 ဒီနေ့ ဒါတွေဝတ်ပါ</div>';
      outfit.forEach((item, i) => {
        html += '<div class="outfit-card__step">';
        html += '<span class="outfit-card__number">' + (i + 1) + '</span>';
        html += '<span class="outfit-card__label">' + esc(item) + '</span>';
        html += '</div>';
      });
      html += '</div>';
    }
    if (data.explanation) {
      html += '<div class="outfit-card">';
      html += '<div style="font-size:var(--text-sm);color:var(--wutt-text);line-height:1.8;white-space:pre-wrap;">' + esc(data.explanation) + '</div>';
      html += '</div>';
    }
    if (data.weather_based_tip) {
      const isRainy = data.weather_desc && (data.weather_desc.includes('rain') || data.weather_desc.includes('Rain'));
      const isHot = data.temperature_c > 30;
      const tipIcon = isRainy ? '🌧️' : (isHot ? '☀️' : '💧');
      html += '<div class="outfit-card outfit-card--tip">';
      html += '<span class="tip-icon">' + tipIcon + '</span>';
      html += '<span>' + esc(data.weather_based_tip) + '</span>';
      html += '</div>';
    }
    return html;
  }

  $('#stylistForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = $('#recommendBtn');
    const occasion = $('#occasion').value;
    if (!occasion) { showToast('ဘယ်အတွက်ဝတ်မလဲ ရွေးပါ။', 'error'); return; }
    const id = uid(); if (!id) return;
    let itemCount = 0;
    try { const wRes = await api('GET', '/wardrobe/' + id); itemCount = (wRes?.data || []).length; } catch {}
    if (itemCount === 0) { showToast('အဝတ်တွေအရင် upload လုပ်ပါ။', 'error'); return; }
    setLoading(btn, true); showThinking(itemCount);
    try {
      const res = await api('POST', '/stylist/recommend', { occasion });
      const resp = $('#aiResponse'); resp.style.cssText = '';
      resp.innerHTML = renderOutfitRecommendation(res.data);
      resp.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      await loadHistory();
    } catch (err) {
      const resp = $('#aiResponse'); resp.style.cssText = '';
      const msg = err?.message || 'ဆာဗာနဲ့ချိတ်ဆက်မှုမအောင်မြင်ပါ။';
      resp.innerHTML = `
        <div class="error-card">
          <div class="error-card__icon">🤖</div>
          <div class="error-card__text">${escapeHtml(msg)}</div>
          <button class="error-card__retry" onclick="document.getElementById('stylistForm').requestSubmit()">ပြန်စမ်းမယ်</button>
        </div>`;
    } finally { setLoading(btn, false); }
  });

  // ── HISTORY ──
  function parseStoredResponse(aiResponse) {
    if (!aiResponse) return { outfit: [], explanation: '', weather_based_tip: '' };
    try {
      const parsed = JSON.parse(aiResponse);
      return { outfit: parsed.outfit || [], explanation: parsed.explanation || '', weather_based_tip: parsed.weather_based_tip || '' };
    } catch {
      return { outfit: [], explanation: aiResponse, weather_based_tip: '' };
    }
  }

  function historyPreview(aiResponse) {
    const { explanation } = parseStoredResponse(aiResponse);
    return explanation.substring(0, 120) + (explanation.length > 120 ? '...' : '');
  }

  function historyFullHTML(aiResponse) {
    const data = parseStoredResponse(aiResponse);
    const outfit = data.outfit || [];
    let html = '';
    if (outfit.length > 0) {
      html += '<div style="font-weight:600;margin-bottom:4px;color:var(--wutt-dark);">ဝတ်ဆင်ရန်အကြံပြုချက်</div>';
      html += '<ul style="padding-left:20px;margin:4px 0 12px;">';
      outfit.forEach(item => { html += '<li>' + item.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</li>'; });
      html += '</ul>';
    }
    if (data.explanation) {
      html += '<div style="white-space:pre-wrap;line-height:1.7;">' + data.explanation.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>';
    }
    if (data.weather_based_tip) {
      html += '<div style="margin-top:8px;padding:8px 12px;background:rgba(227,252,135,0.1);border-radius:8px;font-size:13px;">☀️ ' + data.weather_based_tip.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>';
    }
    return html;
  }

  async function loadHistory() {
    const id = uid(); if (!id) return;
    try {
      const res = await api('GET', '/stylist/history/' + id);
      const sessions = res?.data || [];
      const list = $('#historyList');
      if (!sessions.length) {
        list.innerHTML = `
          <div class="empty-state--visual">
            <div class="empty-state__icon">🕐</div>
            <div class="empty-state__title">စတိုင်မှတ်တမ်း မရှိသေးပါ</div>
            <div class="empty-state__hint">အကြံပြုချက်များ ဒီမှာတွေ့ရပါမယ်</div>
          </div>`;
        return;
      }
      list.innerHTML = sessions.slice(0, 20).map((s,i) => `
        <div class="history__item" id="hist-${i}" onclick="toggleHistory(${i})">
          <div class="history__item-occasion">${s.occasion||''}${s.weather_desc?' · '+s.weather_desc:''}${s.temperature_c?' · '+s.temperature_c.toFixed(0)+'°C':''}</div>
          <div class="history__item-preview">${historyPreview(s.ai_response)}</div>
          <div class="history__item-date">${formatDateMyanmar(s.created_at)}</div>
          <div class="u-hidden" id="hist-full-${i}" style="margin-top:var(--space-sm);font-size:var(--text-xs);color:var(--wutt-text-light);">${historyFullHTML(s.ai_response)}</div>
        </div>
      `).join('');
    } catch {
      $('#historyList').innerHTML = `
        <div class="error-card">
          <div class="error-card__icon">⚠️</div>
          <div class="error-card__text">မှတ်တမ်းမရယူနိုင်ပါ။</div>
          <button class="error-card__retry" onclick="loadHistory()">ပြန်စမ်းမယ်</button>
        </div>`;
    }
  }

  window.toggleHistory = function(i) {
    const item = $('#hist-' + i);
    const full = $('#hist-full-' + i);
    const preview = item?.querySelector('.history__item-preview');
    if (!item || !full) return;
    const isOpen = item.classList.toggle('history__item--expanded');
    if (isOpen) { full.classList.remove('u-hidden'); if (preview) preview.style.display = 'none'; }
    else { full.classList.add('u-hidden'); if (preview) preview.style.display = ''; }
  };

  // ── LOGOUT ──
  $('#logoutBtn').addEventListener('click', goToLogin);

  init();
  </script>
</body>
</html>
