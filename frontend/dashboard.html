<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WUTT Dashboard — Manage your wardrobe and get AI outfit recommendations">
  <meta name="theme-color" content="#253A82">
  <title>WUTT Dashboard — AI Personal Stylist</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Dashboard-specific styles */
    .dashboard { padding-top: 80px; min-height: 100dvh; background: var(--wutt-bg-subtle); }
    .dashboard__grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-xl);
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--space-lg);
    }
    .dashboard__section {
      background: var(--wutt-light);
      border: 1px solid var(--wutt-border);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
    }
    .section__title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: var(--space-lg);
      color: var(--wutt-dark);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }
    .wardrobe__grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: var(--space-md);
      margin-top: var(--space-md);
    }
    .wardrobe__item {
      position: relative;
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1px solid var(--wutt-border);
      aspect-ratio: 3/4;
      cursor: pointer;
    }
    .wardrobe__item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .wardrobe__item-delete {
      position: absolute;
      top: 4px;
      right: 4px;
      min-width: 32px;
      min-height: 32px;
      border-radius: var(--radius-full);
      background: rgba(239, 68, 68, 0.85);
      color: white;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      opacity: 0;
      transition: opacity var(--transition-fast);
    }
    .wardrobe__item:hover .wardrobe__item-delete { opacity: 1; }
    .wardrobe__item-meta {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10,10,10,0.7);
      color: white;
      padding: 0.25rem 0.5rem;
      font-size: var(--text-xs);
    }
    .ai-response {
      background: linear-gradient(135deg, rgba(227,252,135,0.15), rgba(136,162,255,0.1));
      border-left: 4px solid var(--wutt-energy);
      border-radius: var(--radius-md);
      padding: var(--space-lg);
      margin-top: var(--space-md);
      line-height: 1.7;
      animation: slideUp 0.4s ease-out;
    }
    /* Structured outfit blocks */
    .recommend__header {
      margin-bottom: var(--space-md);
      padding-bottom: var(--space-md);
      border-bottom: 1px solid var(--wutt-border-light);
    }
    .recommend__occasion {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--wutt-deep);
    }
    .recommend__weather {
      font-size: var(--text-sm);
      color: var(--wutt-text-light);
      margin-top: 4px;
    }
    .recommend__outfit {
      margin-bottom: var(--space-md);
    }
    .recommend__label {
      font-weight: 600;
      font-size: var(--text-sm);
      color: var(--wutt-deep);
      margin-bottom: var(--space-sm);
    }
    .outfit-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .outfit-list__item {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      background: rgba(136,162,255,0.08);
      border-radius: var(--radius-sm);
      margin-bottom: 4px;
      font-size: var(--text-sm);
      font-weight: 500;
    }
    .outfit-list__num {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--wutt-primary);
      color: var(--wutt-light);
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .recommend__explanation {
      font-size: var(--text-sm);
      color: var(--wutt-text);
      line-height: 1.7;
      margin-bottom: var(--space-md);
    }
    .recommend__tip {
      display: flex;
      align-items: flex-start;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      background: rgba(227,252,135,0.2);
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      font-weight: 500;
      color: #4D7C0F;
    }
    .recommend__tip-icon {
      flex-shrink: 0;
      font-size: 1rem;
    }
    .upload-preview {
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
      margin-top: var(--space-sm);
    }
    .upload-preview__img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: var(--radius-sm);
      border: 1px solid var(--wutt-border);
    }
    .history__item {
      padding: var(--space-md);
      border: 1px solid var(--wutt-border);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-sm);
    }
    .history__item-occasion { font-weight: 600; color: var(--wutt-deep); }
    .history__item-preview {
      font-size: var(--text-sm);
      color: var(--wutt-text-light);
      margin-top: var(--space-xs);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .history__item-date { font-size: var(--text-xs); color: var(--wutt-text-muted); margin-top: var(--space-xs); }
    .empty-state {
      text-align: center;
      padding: var(--space-2xl);
      color: var(--wutt-text-light);
    }
    .empty-state__icon {
      font-size: 2.5rem;
      margin-bottom: var(--space-md);
      opacity: 0.4;
    }
    .empty-state__text {
      font-size: var(--text-sm);
      color: var(--wutt-text-light);
    }
    /* Thinking indicator */
    .thinking {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-lg);
      color: var(--wutt-text-light);
      font-size: var(--text-sm);
    }
    .thinking__dots { display: flex; gap: 4px; }
    .thinking__dot {
      width: 6px; height: 6px;
      background: var(--wutt-primary);
      border-radius: 50%;
      animation: thinkingBounce 1.2s ease-in-out infinite;
    }
    .thinking__dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking__dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes thinkingBounce {
      0%, 80%, 100% { transform: scale(0.4); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }
    /* Retry button */
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      margin-top: var(--space-sm);
      padding: var(--space-xs) var(--space-md);
      font-size: var(--text-xs);
      font-weight: 600;
      border: 1px solid var(--wutt-border);
      border-radius: var(--radius-sm);
      background: var(--wutt-light);
      color: var(--wutt-primary);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .retry-btn:hover { background: rgba(136,162,255,0.08); border-color: var(--wutt-primary); }
    /* Expandable history */
    .history__item {
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .history__item:hover { border-color: var(--wutt-primary); }
    .history__item--expanded .history__item-preview {
      -webkit-line-clamp: unset;
      overflow: visible;
    }
    /* Wardrobe count badge */
    .wardrobe__count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      padding: 0 6px;
      font-size: 11px;
      font-weight: 700;
      color: var(--wutt-light);
      background: var(--wutt-primary);
      border-radius: var(--radius-full);
      margin-left: auto;
    }
    /* Upload progress */
    .upload-progress {
      width: 100%;
      height: 4px;
      background: var(--wutt-border-light);
      border-radius: 2px;
      margin-top: var(--space-sm);
      overflow: hidden;
    }
    .upload-progress__bar {
      height: 100%;
      background: var(--wutt-primary);
      border-radius: 2px;
      transition: width 0.3s ease;
      animation: progressPulse 1.5s ease-in-out infinite;
    }
    @keyframes progressPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    /* Lightbox overlay */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: var(--z-modal);
      background: rgba(10,10,10,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      animation: fadeIn 0.2s ease-out;
    }
    .lightbox img {
      max-width: 90vw;
      max-height: 90dvh;
      object-fit: contain;
      border-radius: var(--radius-md);
      box-shadow: 0 0 80px rgba(136,162,255,0.15);
    }
    .lightbox__meta {
      position: absolute;
      bottom: var(--space-lg);
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: var(--text-sm);
      font-weight: 500;
      background: rgba(0,0,0,0.5);
      padding: var(--space-sm) var(--space-lg);
      border-radius: var(--radius-full);
    }
    /* Image load error fallback */
    .wardrobe__item-error {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      background: var(--wutt-bg-subtle);
      color: var(--wutt-text-muted);
      font-size: 2rem;
    }
    @media (max-width: 768px) {
      .dashboard__grid { grid-template-columns: 1fr; padding: var(--space-md); }
    }
  </style>
</head>
<body>

  <a href="#dashboard-main" class="skip-link">Skip to main content</a>

  <!-- Navbar -->
  <nav class="navbar" role="navigation" aria-label="Dashboard navigation">
    <div class="navbar__inner">

  <main id="dashboard-main" class="dashboard">
    <div class="container" style="margin-bottom:var(--space-lg);">
      <div id="globalAlert" class="u-hidden" role="alert"></div>
    </div>

    <div class="dashboard__grid">
      <!-- Left column -->
      <div>
        <!-- Profile -->
        <div class="dashboard__section stagger">
          <h2 class="section__title">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--wutt-primary)" stroke-width="2" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            ကိုယ်ရေးအချက်အလက်
          </h2>
          <form id="profileForm" novalidate>
            <div class="input">
              <label class="input__label" for="profileHeight">အရပ် (cm)</label>
              <input class="input__field" type="number" id="profileHeight" name="height_cm" placeholder="ဥပမာ 170" min="50" max="250" step="0.1">
            </div>
            <div class="input" style="margin-top:var(--space-md);">
              <label class="input__label" for="profileSkinTone">အသားအရောင်</label>
              <select class="select" id="profileSkinTone" name="skin_tone">
                <option value="">-- ရွေးပါ --</option>
                <option value="fair">အသားဖြူ</option>
                <option value="light">အသားညိုနု</option>
                <option value="medium">အသားညို</option>
                <option value="tan">အသားညိုရင့်</option>
                <option value="dark">အသားမည်း</option>

            </div>
            <div class="input" style="margin-top:var(--space-md);">
              <label class="input__label" for="profileStyle">ဝတ်စားဟန်</label>

                <option value="">-- ရွေးပါ --</option>
                <option value="casual">ပေါ့ပေါ့ပါးပါး</option>
                <option value="formal">ဖောင်ဖေါင်မာမာ</option>
                <option value="traditional">ရိုးရာ</option>

            <div class="input" style="margin-top:var(--space-md);">

            <button type="submit" class="btn btn--primary btn--full" style="margin-top:var(--space-lg);">

            </button>

        <!-- Stylist -->
        <div class="dashboard__section" style="margin-top:var(--space-xl);">
          <h2 class="section__title">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--wutt-energy)" stroke-width="2" aria-hidden="true"><path d="M12 2a4 4 0 0 1 4 4c0 1.1-.4 2.1-1.1 2.9l.5.5a4 4 0 0 1 0 5.7l-.5.5c.7.8 1.1 1.8 1.1 2.9a4 4 0 0 1-4 4"/><path d="M12 2a4 4 0 0 0-4 4c0 1.1.4 2.1 1.1 2.9l-.5.5a4 4 0 0 0 0 5.7l.5.5c-.7.8-1.1 1.8-1.1 2.9a4 4 0 0 0 4 4"/></svg>

          <form id="stylistForm" novalidate>
            <div class="input">

                <option value="wedding">မင်္ဂလာပွဲ</option>
                <option value="work">ရုံးသွား</option>
                <option value="party">ပါတီ</option>

              <span class="btn__label">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true" style="vertical-align:middle;margin-right:6px;"><path d="M12 3l1.5 5.5L19 10l-5.5 1.5L12 17l-1.5-5.5L5 10l5.5-1.5z"/></svg>
                အကြံပေးပါ

              <span class="btn__spinner" aria-hidden="true"></span>
            </button>
          </form>
          <div id="aiResponse" class="u-hidden"></div>
        </div>
      </div>

      <!-- Right column -->
      <div>
        <!-- Wardrobe Upload -->
        <div class="dashboard__section">
          <h2 class="section__title">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--wutt-primary)" stroke-width="2" aria-hidden="true"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            ဗီရို
            <span class="wardrobe__count u-hidden" id="wardrobeCount">0</span>
          </h2>
          <form id="wardrobeForm" novalidate enctype="multipart/form-data">

              </span>
              <span class="upload-box__text">ဓာတ်ပုံထည့်ရန်နှိပ်ပါ</span>

            <div style="display:flex;gap:var(--space-sm);margin-top:var(--space-md);">

                <option value="">အမျိုးအစား</option>
                <option value="top">အပေါ်အင်္ကျီ</option>
                <option value="bottom">ဘောင်းဘီ</option>
                <option value="dress">ဝတ်စုံ</option>
                <option value="outerwear">အင်္ကျီအပေါ်ခံ</option>
                <option value="shoes">ဖိနပ်</option>
                <option value="accessory">အသုံးအဆောင်</option>
              </select>
              <select class="select" id="wardrobeColor" name="color" style="flex:1;">
                <option value="">အရောင်</option>
                <option value="black">အနက်</option><option value="white">အဖြူ</option>
                <option value="red">အနီ</option><option value="blue">အပြာ</option>
                <option value="green">အစိမ်း</option><option value="yellow">အဝါ</option>
                <option value="pink">ပန်းရောင်</option><option value="purple">ခရမ်း</option>
                <option value="brown">အညို</option><option value="grey">မီးခိုး</option>
                <option value="navy">နေပယ်ပြာ</option><option value="beige">ဘဲဂျီ</option>
              </select>
            </div>
            <button type="submit" class="btn btn--navy btn--full" style="margin-top:var(--space-md);" id="uploadBtn">
              <span class="btn__label">ထည့်မယ်</span>
              <span class="btn__spinner" aria-hidden="true"></span>
            </button>
          </form>
          <div class="wardrobe__grid" id="wardrobeGrid">
            <div class="empty-state">အဝတ်တွေထည့်ဖို့ ဓာတ်ပုံရိုက်ပြီး upload လုပ်ပါ</div>
          </div>
        </div>

        <!-- History -->
        <div class="dashboard__section" style="margin-top:var(--space-xl);">
          <h2 class="section__title">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--wutt-lavender)" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            အကြံပေးမှတ်တမ်း
          </h2>
          <div id="historyList">
            <div class="empty-state" id="historyEmpty">အကြံပေးမှတ်တမ်းမရှိသေးပါ</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

  <script>
  // ── WUTT Dashboard — Vanilla JS, fully polished ──────
  const API = 'https://wutt.onrender.com';

  // Token persisted by index.html login/register flow.
  const AUTH_TOKEN = localStorage.getItem('wutt_token');
  if (!AUTH_TOKEN) { window.location.href = './index.html'; }

  let currentUser = null;

  const $ = (s) => document.querySelector(s);
  const $$ = (s) => document.querySelectorAll(s);

  /** Thin wrapper around fetch — injects Authorization header everywhere. */
  async function api(method, path, body, formData) {
    const headers = { 'Authorization': 'Bearer ' + AUTH_TOKEN };
    if (!formData) { headers['Content-Type'] = 'application/json'; }

    const opts = { method, headers, credentials: 'include' };
    if (formData) { opts.body = formData; }
    else if (body) { opts.body = JSON.stringify(body); }

    // 15-second timeout — show feedback if request hangs
    const controller = new AbortController();
    opts.signal = controller.signal;
    const timeout = setTimeout(() => controller.abort(), 15000);

    try {
      const res = await fetch(API + path, opts);
      clearTimeout(timeout);
      const data = await res.json().catch(() => null);
      if (!res.ok) {
        if (res.status === 401) {
          localStorage.removeItem('wutt_token');
          window.location.href = './index.html';
          return;
        }
        throw new Error(data?.detail?.message || res.statusText);
      }
      return data;
    } catch (e) {
      clearTimeout(timeout);
      if (e.name === 'AbortError') {
        showToast('ဆာဗာချိတ်ဆက်မှုကြာနေပါတယ်။ ပြန်စမ်းကြည့်ပါ။', 'error');
      } else {
        showToast(e.message, 'error');
      }
      throw e;
    }
  }

  function showToast(msg, type) {
    const t = document.createElement('div');
    t.className = 'toast toast--' + (type||'info');
    t.setAttribute('role', 'status');
    t.textContent = msg;
    t.addEventListener('animationend', (e) => { if (e.animationName==='fadeOut') t.remove(); });
    $('#toastContainer').appendChild(t);
  }

  function setLoading(btn, loading) {
    if (loading) { btn.classList.add('btn--loading'); btn.setAttribute('aria-disabled','true'); }
    else { btn.classList.remove('btn--loading'); btn.removeAttribute('aria-disabled'); }
  }

  // ═══════════════════════════════════════════════════════
  //  INIT — Load all data with skeleton states
  // ═══════════════════════════════════════════════════════
  async function init() {
    // Show skeletons while loading
    showSkeletons();
    try {
      const meData = await api('GET', '/auth/me');
      if (meData.status !== 'success' || !meData.data?.id) {
        localStorage.removeItem('wutt_token');
        window.location.href = './index.html'; return;
      }
      currentUser = { id: meData.data.id, email: meData.data.email };
      $('#dashboardUserEmail').textContent = meData.data.email;
    } catch {
      localStorage.removeItem('wutt_token');
      window.location.href = './index.html'; return;
    }

    await Promise.all([loadProfile(), loadWardrobe(), loadHistory()]);
    clearSkeletons();
  }

  function showSkeletons() {
    $('#wardrobeGrid').innerHTML = `
      <div class="skeleton skeleton--card" style="height:140px;"></div>
      <div class="skeleton skeleton--card" style="height:140px;"></div>
      <div class="skeleton skeleton--card" style="height:140px;"></div>`;
    $('#historyList').innerHTML = `
      <div class="skeleton skeleton--text" style="width:70%;"></div>
      <div class="skeleton skeleton--text" style="width:50%;"></div>
      <div class="skeleton skeleton--text" style="width:60%;"></div>`;
    // Show count badge as skeleton
    const count = $('#wardrobeCount');
    if (count) { count.classList.add('u-hidden'); }
  }

  function clearSkeletons() {
    // Handled by load* functions replacing innerHTML
  }

  const uid = () => currentUser?.id;

  // ═══════════════════════════════════════════════════════
  //  PROFILE
  // ═══════════════════════════════════════════════════════
  async function loadProfile() {
    const id = uid(); if (!id) return;
    try {
      const users = await api('GET', '/profile/' + id);
      if (users?.data?.id) {
        const p = users.data;
        $('#profileHeight').value = p.height_cm || '';
        $('#profileSkinTone').value = p.skin_tone || '';
        $('#profileStyle').value = p.style_preference || '';
        $('#profileCity').value = p.location_city || '';
      }
    } catch {
      // Profile might not exist yet — that's OK (404 = no profile)
    }
  }

  $('#profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = uid(); if (!id) return;
    const btn = $('#profileForm').querySelector('button[type=submit]');
    setLoading(btn, true);
    try {
      const body = {
        height_cm: parseFloat($('#profileHeight').value) || null,
        skin_tone: $('#profileSkinTone').value || null,
        style_preference: $('#profileStyle').value || null,
        location_city: $('#profileCity').value || null,
      };
      const res = await api('PUT', '/profile/' + id, body);
      showToast(res.message || 'ကိုယ်ရေးအချက်အလက်သိမ်းပြီးပါပြီ။', 'success');
    } catch {} finally { setLoading(btn, false); }
  });

  // ═══════════════════════════════════════════════════════
  //  WARDROBE — upload, list, delete, drag-and-drop
  // ═══════════════════════════════════════════════════════
  async function loadWardrobe() {
    const id = uid(); if (!id) return;
    try {
      const res = await api('GET', '/wardrobe/' + id);
      const items = res?.data || [];
      const grid = $('#wardrobeGrid');
      const count = $('#wardrobeCount');

      if (count) {
        count.textContent = items.length;
        count.classList.toggle('u-hidden', items.length === 0);
      }

      if (!items.length) {
        grid.innerHTML = `<div class="empty-state">
          <div class="empty-state__icon">👗</div>
          <div class="empty-state__text">အဝတ်တွေထည့်ဖို့ ဓာတ်ပုံရိုက်ပြီး upload လုပ်ပါ</div>
        </div>`;
        return;
      }
      grid.innerHTML = items.map(i => `
        <div class="wardrobe__item" onclick="openLightbox('${i.cloudinary_url}','${(i.category||'')} ${i.color?'· '+i.color:''}')">
          <img src="${i.cloudinary_url}" alt="${i.category||'Wardrobe item'}" loading="lazy"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
          <div class="wardrobe__item-error" style="display:none;">👗</div>
          <button class="wardrobe__item-delete" data-id="${i.id}" title="ဖျက်မယ်" aria-label="Delete item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
          <div class="wardrobe__item-meta">${i.category||''} ${i.color?'· '+i.color:''}</div>
        </div>
      `).join('');
      grid.querySelectorAll('.wardrobe__item-delete').forEach(b => {
        b.addEventListener('click', (ev) => { ev.stopPropagation(); deleteItem(b.dataset.id); });
      });
    } catch {
      $('#wardrobeGrid').innerHTML = `<div class="empty-state">
        <div class="empty-state__text" style="color:var(--wutt-error);">ဗီရိုဒေတာမရယူနိုင်ပါ။</div>
        <button class="retry-btn" onclick="loadWardrobe()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg> ပြန်စမ်းမယ်</button>
      </div>`;
    }
  }

  async function deleteItem(id) {
    // Use toast-based confirmation instead of browser confirm()
    const toastId = 'del-confirm-' + Date.now();
    const t = document.createElement('div');
    t.className = 'toast toast--warning';
    t.id = toastId;
    t.setAttribute('role', 'alert');
    t.innerHTML = `<span style="flex:1;">ဒီအဝတ်ကိုဖျက်မှာသေချာလား?</span>
      <button onclick="confirmDelete(${id},'${toastId}')" style="background:var(--wutt-error);color:white;border:none;padding:4px 12px;border-radius:4px;font-weight:600;cursor:pointer;font-family:inherit;">ဖျက်မယ်</button>
      <button onclick="dismissToast('${toastId}')" style="background:transparent;border:1px solid var(--wutt-border);padding:4px 12px;border-radius:4px;cursor:pointer;font-family:inherit;">မဖျက်ပါ</button>`;
    $('#toastContainer').appendChild(t);
  }

  window.confirmDelete = async function(id, toastId) {
    dismissToast(toastId);
    try {
      await api('DELETE', '/wardrobe/' + id);
      showToast('ဖျက်ပြီးပါပြီ။', 'success');
      await loadWardrobe();
    } catch {}
  };

  window.dismissToast = function(id) {
    const t = document.getElementById(id);
    if (t) { t.style.opacity = '0'; t.style.transform = 'translateY(-8px)'; setTimeout(() => t.remove(), 300); }
  };

  // ── Lightbox ─────────────────────────────────────────
  window.openLightbox = function(url, meta) {
    const lb = document.createElement('div');
    lb.className = 'lightbox';
    lb.onclick = () => lb.remove();
    lb.innerHTML = `<img src="${url}" alt="${meta||'Wardrobe item'}" onclick="event.stopPropagation();">${meta ? '<div class="lightbox__meta">'+meta+'</div>' : ''}`;
    document.body.appendChild(lb);
    // Close on Escape
    const onKey = (e) => { if (e.key === 'Escape') { lb.remove(); document.removeEventListener('keydown', onKey); } };
    document.addEventListener('keydown', onKey);
  };

  // ── File input + drag-and-drop ──────────────────────
  const ALLOWED_TYPES = ['image/jpeg','image/png','image/webp'];
  const MAX_SIZE = 10 * 1024 * 1024; // 10 MB

  function validateFile(file) {
    if (!file) return null;
    if (!ALLOWED_TYPES.includes(file.type)) {
      return 'JPEG, PNG, or WebP ဖိုင်သာထည့်ပါ။';
    }
    if (file.size > MAX_SIZE) {
      return 'ဖိုင်ဆိုဒ် 10 MB ထက်မကျော်ပါနဲ့။';
    }
    return null;
  }

  function showPreview(file) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = document.createElement('img');
      img.src = ev.target.result;
      img.className = 'upload-preview__img';
      $('#uploadPreview').appendChild(img);
    };
    reader.readAsDataURL(file);
  }

  function handleFileSelect(file) {
    const err = validateFile(file);
    if (err) { showToast(err, 'error'); return false; }
    $('#uploadPreview').innerHTML = '';
    showPreview(file);
    return true;
  }

  $('#wardrobeFile').addEventListener('change', (e) => {
    if (e.target.files[0]) handleFileSelect(e.target.files[0]);
  });

  // Drag-and-drop on the upload box
  const uploadBox = $('#uploadBox');
  if (uploadBox) {
    ['dragenter','dragover'].forEach(evt => {
      uploadBox.addEventListener(evt, (e) => {
        e.preventDefault();
        uploadBox.classList.add('upload-box--active');
      });
    });
    ['dragleave','drop'].forEach(evt => {
      uploadBox.addEventListener(evt, (e) => {
        e.preventDefault();
        uploadBox.classList.remove('upload-box--active');
      });
    });
    uploadBox.addEventListener('drop', (e) => {
      const file = e.dataTransfer.files[0];
      if (file) {
        $('#wardrobeFile').files = e.dataTransfer.files;
        handleFileSelect(file);
      }
    });
  }

  $('#wardrobeForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const file = $('#wardrobeFile').files[0];
    if (!file) { showToast('ဓာတ်ပုံရွေးချယ်ပါ။', 'error'); return; }
    const err = validateFile(file);
    if (err) { showToast(err, 'error'); return; }

    const btn = $('#uploadBtn');
    setLoading(btn, true);

    // Show upload progress bar
    const progressHTML = '<div class="upload-progress"><div class="upload-progress__bar" style="width:60%;"></div></div>';
    const progressEl = document.createElement('div');
    progressEl.innerHTML = progressHTML;
    btn.parentNode.insertBefore(progressEl.firstElementChild, btn.nextSibling);

    try {
      const fd = new FormData();
      fd.append('file', file);
      const cat = $('#wardrobeCategory').value;
      const col = $('#wardrobeColor').value;
      if (cat) fd.append('category', cat);
      if (col) fd.append('color', col);
      const res = await api('POST', '/wardrobe/upload', null, fd);
      showToast(res.message || 'ထည့်ပြီးပါပြီ။', 'success');
      $('#wardrobeForm').reset();
      $('#uploadPreview').innerHTML = '';
      await loadWardrobe();
    } catch {} finally {
      setLoading(btn, false);
      // Remove progress bar
      const bar = btn.parentNode.querySelector('.upload-progress');
      if (bar) bar.remove();
    }
  });

  // ═══════════════════════════════════════════════════════
  //  STYLIST — AI recommendation with structured output
  // ═══════════════════════════════════════════════════════

  function showThinking(itemCount) {
    const resp = $('#aiResponse');
    resp.classList.remove('u-hidden');
    resp.className = 'thinking';
    resp.innerHTML = `
      <div style="text-align:center;">
        <div style="font-weight:600;margin-bottom:4px;">AI စဉ်းစားနေသည်</div>
        <div style="font-size:12px;color:var(--wutt-text-muted);margin-bottom:8px;">ဗီရိုထဲက အဝတ် ${itemCount||'?'} ခုကို ခွဲခြမ်းစိတ်ဖြာနေပါတယ်...</div>
        <span class="thinking__dots">
          <span class="thinking__dot"></span>
          <span class="thinking__dot"></span>
          <span class="thinking__dot"></span>
        </span>
      </div>`;
    resp.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  /** Myanmar-friendly date formatting */
  function formatDateMyanmar(isoStr) {
    if (!isoStr) return '';
    const date = new Date(isoStr);
    if (isNaN(date.getTime())) return isoStr;
    const months = ['ဇန်နဝါရီ','ဖေဖော်ဝါရီ','မတ်','ဧပြီ','မေ','ဇွန်','ဇူလိုင်','သြဂုတ်','စက်တင်ဘာ','အောက်တိုဘာ','နိုဝင်ဘာ','ဒီဇင်ဘာ'];
    const y = date.getFullYear();
    const m = months[date.getMonth()];
    const d = date.getDate();
    const h = date.getHours();
    const min = String(date.getMinutes()).padStart(2,'0');
    const ampm = h >= 12 ? 'ညနေ' : 'မနက်';
    const h12 = h % 12 || 12;
    return `${y} ${m} ${d} · ${ampm} ${h12}:${min}`;
  }

  function renderOutfitRecommendation(data) {
    let html = '';

    // ── Header: occasion + weather ─────────────────────
    const occasionLabels = {wedding:'မင်္ဂလာပွဲ',work:'ရုံးသွား',party:'ပါတီ',date:'ချိန်းတွေ့',casual:'အပြင်ထွက်',interview:'အင်တာဗျူး'};
    html += '<div class="recommend__header">';
    html += '<div class="recommend__occasion">' + (occasionLabels[data.occasion] || data.occasion) + '</div>';
    if (data.weather_desc) {
      html += '<div class="recommend__weather">';
      html += '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>';
      html += data.weather_desc;
      if (data.temperature_c) html += ' · ' + data.temperature_c.toFixed(0) + '°C';
      if (data.location) html += ' · ' + data.location;
      html += '</div>';
    }
    html += '</div>';

    // ── Outfit items ───────────────────────────────────
    const outfit = data.outfit || [];
    if (outfit.length > 0) {
      html += '<div class="recommend__outfit">';
      html += '<div class="recommend__label">👗 ဒီနေ့ ဒါတွေဝတ်ပါ</div>';
      html += '<ul class="outfit-list">';
      outfit.forEach((item, i) => {
        html += '<li class="outfit-list__item">';
        html += '<span class="outfit-list__num">' + (i + 1) + '</span>';
        html += item.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        html += '</li>';
      });
      html += '</ul></div>';
    }

    // ── Explanation ────────────────────────────────────
    if (data.explanation) {
      html += '<div class="recommend__explanation">';
      html += data.explanation.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      html += '</div>';
    }

    // ── Weather tip ────────────────────────────────────
    if (data.weather_based_tip) {
      html += '<div class="recommend__tip">';
      html += '<span class="recommend__tip-icon">☀️</span>';
      html += data.weather_based_tip.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      html += '</div>';
    }

    return html;
  }

  $('#stylistForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = $('#recommendBtn');
    const occasion = $('#occasion').value;
    if (!occasion) { showToast('အခါအခွင့်ရွေးချယ်ပါ။', 'error'); return; }

    // Pre-check: verify wardrobe has items before waiting on AI
    const id = uid(); if (!id) return;
    let itemCount = 0;
    try {
      const wRes = await api('GET', '/wardrobe/' + id);
      itemCount = (wRes?.data || []).length;
    } catch { /* proceed anyway */ }
    if (itemCount === 0) {
      showToast('အဝတ်တွေအရင် upload လုပ်ပါ။ ဗီရိုထဲမှာတစ်ခုမှမရှိသေးပါ။', 'error');
      return;
    }

    setLoading(btn, true);
    showThinking(itemCount);

    try {
      const res = await api('POST', '/stylist/recommend', { occasion });
      const resp = $('#aiResponse');
      resp.className = 'ai-response';
      resp.innerHTML = renderOutfitRecommendation(res.data);
      resp.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      await loadHistory();
    } catch {
      $('#aiResponse').classList.add('u-hidden');
    } finally { setLoading(btn, false); }
  });

  // ═══════════════════════════════════════════════════════
  //  HISTORY — expandable items, structured-response aware
  // ═══════════════════════════════════════════════════════

  function parseStoredResponse(aiResponse) {
    // Try parsing structured JSON from the stored ai_response
    if (!aiResponse) return { outfit: [], explanation: '', weather_based_tip: '' };
    try {
      const parsed = JSON.parse(aiResponse);
      return {
        outfit: parsed.outfit || [],
        explanation: parsed.explanation || '',
        weather_based_tip: parsed.weather_based_tip || '',
      };
    } catch {
      // Legacy free-text response
      return { outfit: [], explanation: aiResponse, weather_based_tip: '' };
    }
  }

  function historyPreview(aiResponse) {
    const { explanation } = parseStoredResponse(aiResponse);
    return explanation.substring(0, 150) + (explanation.length > 150 ? '...' : '');
  }

  function historyFullHTML(aiResponse) {
    const data = parseStoredResponse(aiResponse);
    const outfit = data.outfit || [];
    let html = '';
    if (outfit.length > 0) {
      html += '<div style="font-weight:600;margin-bottom:4px;color:var(--wutt-deep);">ဝတ်ဆင်ရန်အကြံပြုချက်</div>';
      html += '<ul style="padding-left:20px;margin:4px 0 12px;">';
      outfit.forEach(item => {
        html += '<li>' + item.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</li>';
      });
      html += '</ul>';
    }
    if (data.explanation) {
      html += '<div style="white-space:pre-wrap;line-height:1.7;">' + data.explanation.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>';
    }
    if (data.weather_based_tip) {
      html += '<div style="margin-top:8px;padding:8px 12px;background:rgba(227,252,135,0.2);border-radius:8px;font-size:13px;">☀️ ' + data.weather_based_tip.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>';
    }
    return html;
  }

  async function loadHistory() {
    const id = uid(); if (!id) return;
    try {
      const res = await api('GET', '/stylist/history/' + id);
      const sessions = res?.data || [];
      const list = $('#historyList');
      if (!sessions.length) {
        list.innerHTML = `<div class="empty-state">
          <div class="empty-state__icon">🕐</div>
          <div class="empty-state__text">အကြံပေးမှတ်တမ်းမရှိသေးပါ</div>
        </div>`;
        return;
      }
      list.innerHTML = sessions.slice(0, 20).map((s,i) => `
        <div class="history__item" id="hist-${i}" onclick="toggleHistory(${i})">
          <div class="history__item-occasion">${s.occasion||''}${s.weather_desc?' · '+s.weather_desc:''}${s.temperature_c?' · '+s.temperature_c.toFixed(0)+'°C':''}</div>
          <div class="history__item-preview">${historyPreview(s.ai_response)}</div>
          <div class="history__item-date">${formatDateMyanmar(s.created_at)}</div>
          <div class="u-hidden" id="hist-full-${i}" style="margin-top:var(--space-sm);font-size:var(--text-sm);color:var(--wutt-text);">${historyFullHTML(s.ai_response)}</div>
        </div>
      `).join('');
    } catch {
      $('#historyList').innerHTML = `<div class="empty-state">
        <div class="empty-state__text" style="color:var(--wutt-error);">မှတ်တမ်းမရယူနိုင်ပါ။</div>
        <button class="retry-btn" onclick="loadHistory()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg> ပြန်စမ်းမယ်</button>
      </div>`;
    }
  }

  // Exposed globally for onclick handler
  window.toggleHistory = function(i) {
    const item = $('#hist-' + i);
    const full = $('#hist-full-' + i);
    const preview = item?.querySelector('.history__item-preview');
    if (!item || !full) return;
    const isOpen = item.classList.toggle('history__item--expanded');
    if (isOpen) {
      full.classList.remove('u-hidden');
      if (preview) preview.style.display = 'none';
    } else {
      full.classList.add('u-hidden');
      if (preview) preview.style.display = '';
    }
  };

  // ═══════════════════════════════════════════════════════
  //  LOGOUT
  // ═══════════════════════════════════════════════════════
  $('#logoutBtn').addEventListener('click', () => {
    localStorage.removeItem('wutt_token');
    document.cookie = 'wutt_token=; Max-Age=0; path=/;';
    window.location.href = './index.html';
  });

  init();
  </script>
</body>
</html>
